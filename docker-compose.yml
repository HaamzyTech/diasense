services:
  backend-api:
    build:
      context: ./apps/backend-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-diasense}
      POSTGRES_USER: ${POSTGRES_USER:-diasense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diasense}
      MODEL_SERVER_URL: ${MODEL_SERVER_URL:-http://model-server:5001}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-tracking:5000}
      BACKEND_ADMIN_USERNAME: ${BACKEND_ADMIN_USERNAME:-admin}
      BACKEND_ADMIN_PASSWORD: ${BACKEND_ADMIN_PASSWORD:-admin}
      BACKEND_ADMIN_ROLE: ${BACKEND_ADMIN_ROLE:-admin}
      BACKEND_AUTH_SECRET_KEY: ${BACKEND_AUTH_SECRET_KEY:-diasense-dev-secret}
      BACKEND_AUTH_TOKEN_TTL_SECONDS: ${BACKEND_AUTH_TOKEN_TTL_SECONDS:-43200}
    ports:
      - "${BACKEND_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      model-server:
        condition: service_started
      mlflow-tracking:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health').status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 10
  model-server:
    build:
      context: ./infra/mlflow
    command: ["mlflow", "models", "serve", "-m", "models:/diasense-diabetes-risk/Production", "-p", "5001", "--host", "0.0.0.0", "--env-manager", "local"]
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-tracking:5000}
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: "true"
    ports:
      - "${MODEL_SERVER_PORT:-5001}:5001"
    depends_on:
      mlflow-tracking:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5001/ping').status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-diasense}
      POSTGRES_USER: ${POSTGRES_USER:-diasense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diasense}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diasense} -d ${POSTGRES_DB:-diasense}"]
      interval: 10s
      timeout: 5s
      retries: 8

  postgres-create-airflow-db:
    image: postgres:17-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-diasense}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until pg_isready -h postgres -p ${POSTGRES_PORT:-5432} -U ${POSTGRES_USER:-diasense} -d postgres; do
          sleep 2
        done
        if ! psql -h postgres -p ${POSTGRES_PORT:-5432} -U ${POSTGRES_USER:-diasense} -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='${AIRFLOW_POSTGRES_DB:-airflow}'" | grep -q 1; then
          psql -h postgres -p ${POSTGRES_PORT:-5432} -U ${POSTGRES_USER:-diasense} -d postgres -c "CREATE DATABASE \"${AIRFLOW_POSTGRES_DB:-airflow}\""
        fi
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  minio:
    image: quay.io/minio/minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-create-bucket:
    image: quay.io/minio/mc
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local ${MINIO_ENDPOINT_URL:-http://minio:9000} ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
          sleep 2
        done
        mc mb --ignore-existing local/${MLFLOW_ARTIFACTS_BUCKET:-mlflow}
    depends_on:
      minio:
        condition: service_started
    restart: "no"

  mlflow-tracking:
    image: ghcr.io/mlflow/mlflow:latest
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "sqlite:////mlflow/mlflow.db", "--default-artifact-root", "mlflow-artifacts:/", "--artifacts-destination", "s3://${MLFLOW_ARTIFACTS_BUCKET:-mlflow}", "--allowed-hosts", "localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,mlflow-tracking,mlflow-tracking:5000"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: "true"
    ports:
      - "${MLFLOW_TRACKING_PORT:-5000}:5000"
    volumes:
      - ./infra/mlflow_data:/mlflow
    depends_on:
      minio-create-bucket:
        condition: service_completed_successfully

  ml:
    build:
      context: ./ml
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    working_dir: /workspace/ml
    command: ["sleep", "infinity"]
    stdin_open: true
    tty: true
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      PYTHONPATH: /workspace/ml/src
      MLFLOW_TRACKING_URI: http://mlflow-tracking:5000
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: "true"
    volumes:
      - .:/workspace
      - ./infra/mlflow_data:/mlflow
    depends_on:
      mlflow-tracking:
        condition: service_started

  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    command:
      - bash
      - -lc
      - |
        mkdir -p /opt/airflow/logs
        python - <<'PY'
        import json
        import os
        from pathlib import Path

        username = os.getenv("AIRFLOW_ADMIN_USER", "admin")
        password = os.getenv("AIRFLOW_ADMIN_PASSWORD", "admin")
        password_file = Path("/opt/airflow/simple_auth_manager_passwords.json")
        password_file.write_text(json.dumps({username: password}) + "\n", encoding="utf-8")
        PY
        exec airflow standalone
    user: "${UID:-1000}:0"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW_ADMIN_USER:-admin}:ADMIN
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/simple_auth_manager_passwords.json
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-diasense}:${POSTGRES_PASSWORD:-diasense}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${AIRFLOW_POSTGRES_DB:-airflow}
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-diasense}
      POSTGRES_USER: ${POSTGRES_USER:-diasense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diasense}
      DIASENSE_PIPELINE_DB_DSN: ${DIASENSE_PIPELINE_DB_DSN:-}
      DIASENSE_REPO_ROOT: ${DIASENSE_REPO_ROOT:-/workspace}
      DIASENSE_ML_DIR: ${DIASENSE_ML_DIR:-/workspace/ml}
      DIASENSE_ML_CONFIG_PATH: ${DIASENSE_ML_CONFIG_PATH:-/workspace/ml/params.yaml}
      DIASENSE_BASELINE_DATA_PATH: ${DIASENSE_BASELINE_DATA_PATH:-/workspace/ml/data/features/train.csv}
      DIASENSE_RECENT_DATA_PATH: ${DIASENSE_RECENT_DATA_PATH:-/workspace/ml/data/processed/processed.csv}
      DIASENSE_BASELINE_PATH: ${DIASENSE_BASELINE_PATH:-/workspace/ml/artifacts/baselines/drift_baseline.json}
      DIASENSE_CURRENT_FEATURE_STATS_PATH: ${DIASENSE_CURRENT_FEATURE_STATS_PATH:-/workspace/ml/artifacts/reports/current_feature_stats.json}
      DIASENSE_DRIFT_REPORT_PATH: ${DIASENSE_DRIFT_REPORT_PATH:-/workspace/ml/artifacts/reports/drift_report.json}
      DIASENSE_ALERT_METRICS_PATH: ${DIASENSE_ALERT_METRICS_PATH:-/workspace/ml/artifacts/reports/drift_alert_metrics.prom}
      DIASENSE_DRIFT_PSI_THRESHOLD: ${DIASENSE_DRIFT_PSI_THRESHOLD:-0.2}
      DIASENSE_DRIFT_KS_THRESHOLD: ${DIASENSE_DRIFT_KS_THRESHOLD:-0.2}
      DIASENSE_DRIFT_MEAN_SHIFT_THRESHOLD: ${DIASENSE_DRIFT_MEAN_SHIFT_THRESHOLD:-1.0}
      PYTHONPATH: /workspace/ml/src
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-tracking:5000}
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: "true"
    volumes:
      - .:/workspace
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    depends_on:
      postgres-create-airflow-db:
        condition: service_completed_successfully
      mlflow-tracking:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/api/v2/monitor/health').status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      backend-api:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  mlflow_data:
  minio_data:
