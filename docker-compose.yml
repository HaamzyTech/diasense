services:
  model-server:
    build:
      context: ./infra/mlflow
    command: ["mlflow", "models", "serve", "-m", "models:/diasense-diabetes-risk/Production", "-p", "5001", "--host", "0.0.0.0"]
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-tracking:5000}
    ports:
      - "${MODEL_SERVER_PORT:-5001}:5001"
    depends_on:
      mlflow-tracking:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5001/ping').status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-diasense}
      POSTGRES_USER: ${POSTGRES_USER:-diasense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diasense}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diasense} -d ${POSTGRES_DB:-diasense}"]
      interval: 10s
      timeout: 5s
      retries: 8

  mlflow-tracking:
    image: ghcr.io/mlflow/mlflow:latest
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "sqlite:///mlflow.db", "--default-artifact-root", "/mlflow/artifacts"]
    ports:
      - "${MLFLOW_TRACKING_PORT:-5000}:5000"
    volumes:
      - ./infra/mlflow_data:/mlflow

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  mlflow_data:
