services:
  model-server:
    build:
      context: ./infra/mlflow
    command: ["mlflow", "models", "serve", "-m", "models:/diasense-diabetes-risk/Production", "-p", "5001", "--host", "0.0.0.0", "--env-manager", "local"]
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-tracking:5000}
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: "true"
    ports:
      - "${MODEL_SERVER_PORT:-5001}:5001"
    depends_on:
      mlflow-tracking:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5001/ping').status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-diasense}
      POSTGRES_USER: ${POSTGRES_USER:-diasense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diasense}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diasense} -d ${POSTGRES_DB:-diasense}"]
      interval: 10s
      timeout: 5s
      retries: 8

  minio:
    image: quay.io/minio/minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-create-bucket:
    image: quay.io/minio/mc
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local ${MINIO_ENDPOINT_URL:-http://minio:9000} ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
          sleep 2
        done
        mc mb --ignore-existing local/${MLFLOW_ARTIFACTS_BUCKET:-mlflow}
    depends_on:
      minio:
        condition: service_started
    restart: "no"

  mlflow-tracking:
    image: ghcr.io/mlflow/mlflow:latest
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "sqlite:////mlflow/mlflow.db", "--default-artifact-root", "mlflow-artifacts:/", "--artifacts-destination", "s3://${MLFLOW_ARTIFACTS_BUCKET:-mlflow}", "--allowed-hosts", "localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,mlflow-tracking,mlflow-tracking:5000"]
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: "true"
    ports:
      - "${MLFLOW_TRACKING_PORT:-5000}:5000"
    volumes:
      - ./infra/mlflow_data:/mlflow
    depends_on:
      minio-create-bucket:
        condition: service_completed_successfully

  ml:
    build:
      context: ./ml
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    working_dir: /workspace/ml
    command: ["sleep", "infinity"]
    stdin_open: true
    tty: true
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      PYTHONPATH: /workspace/ml/src
      MLFLOW_TRACKING_URI: http://mlflow-tracking:5000
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: "true"
    volumes:
      - .:/workspace
      - ./infra/mlflow_data:/mlflow
    depends_on:
      mlflow-tracking:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  mlflow_data:
  minio_data:
