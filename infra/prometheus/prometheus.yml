global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: backend_api
    metrics_path: /metrics
    static_configs:
      - targets: ["backend-api:8000"]

  - job_name: alertmanager
    metrics_path: /metrics
    static_configs:
      - targets: ["alertmanager:9093"]

