data:
  source_url: https://raw.githubusercontent.com/npradaschnor/Pima-Indians-Diabetes-Dataset/refs/heads/master/diabetes.csv
  time_out: 60
  target_column: outcome
  train_size: 0.80
  val_size: 0.1
  test_size: 0.1
  random_state: 42

paths:
  DATA_DIR: data
  ARTIFACTS_DIR: artifacts
  raw_data: raw
  validated_data: validated
  processed_data: processed
  feature_data: features
  report_dir: reports
  model_dir: models
  baseline_dir: baselines

files:
  dataset: diabetes.csv
  schema: raw_schema.json
  metrics: raw_metrics.json
  # validation
  validated_dataset: validated.csv
  validation_report: validation_report.json
  # preprocessing
  raw_snapshot: raw_snapshot.csv
  processed_dataset: processed.csv
  train_set: train.csv
  test_set: test.csv
  val_set: val.csv
  preprocessing_artifact: preprocessing_artifact.json
  # train
  best_model: best_model.pkl
  train_summary: train_summary.json
  leaderboard: leaderboard.json
  train_metrics: train_metrics.json
  validation_metrics: validation_metrics.json
  train_classification_report: train_classification_report.json
  validation_classification_report: validation_classification_report.json
  train_predictions: train_predictions.csv
  validation_predictions: validation_predictions.csv
  train_confusion_matrix: train_confusion_matrix.png
  validation_confusion_matrix: validation_confusion_matrix.png
  validation_roc_curve: validation_roc_curve.png
  validation_precision_recal_curve: validation_precision_recall_curve.png
  drift_baseline: drift_baseline.json
  # evaluation
  evaluation_summary: evaluation_summary.json
  test_metrics: test_metrics.json
  test_classification_report: test_classification_report.json
  threshold_results: threshold_results.json
  test_predictions: test_predictions.csv
  test_confusion_matrix: test_confusion_matrix.png
  test_roc_curve: test_roc_curve.png
  test_precision_recal_curve: test_precision_recall_curve.png

schema:
  target_columns: Outcome

  expected_cols:
    - Pregnancies
    - Glucose
    - BloodPressure
    - SkinThickness
    - Insulin
    - BMI
    - DiabetesPedigreeFunction
    - Age
    - Outcome
  
  rename_map:
    Pregnancies: pregnancies
    Glucose: glucose
    BloodPressure: blood_pressure
    SkinThickness: skin_thickness
    Insulin: insulin
    BMI: bmi
    DiabetesPedigreeFunction: diabetes_pedigree_function
    Age: age
    Outcome: outcome

  feature_cols:
    - pregnancies
    - glucose
    - blood_pressure
    - skin_thickness
    - insulin
    - bmi
    - diabetes_pedigree_function
    - age

  lable_col: outcome

  derived_features:
    bmi_group: true
    age_band: true

  zero_as_missing_columns:
    - glucose
    - blood_pressure
    - skin_thickness
    - insulin
    - bmi

  valid_ranges:
    pregnancies:
      min: 0
      max: 20
    glucose:
      min: 40
      max: 250
    blood_pressure:
      min: 24
      max: 140
    skin_thickness:
      min: 7
      max: 99
    insulin:
      min: 14
      max: 900
    bmi:
      min: 10
      max: 70
    diabetes_pedigree_function:
      min: 0.05
      max: 3
    age:
      min: 18
      max: 100
    outcome:
      min: 0
      max: 1

  drop_columns:
    - split

  categorical_columns:
    - bmi_group
    - age_band

preprocess:
  outlier:
    enabled: true
    method: iqr
    multiplier: 1.5
    columns:
      - pregnancies
      - glucose
      - blood_pressure
      - skin_thickness
      - insulin
      - bmi
      - diabetes_pedigree_function
      - age

train:
  primary_metric: val_f1
  enabled_models: 
    - logistic_regression
    - random_forest
    - xgboost
  models:
    logistic_regression:
      C: 1.0
      max_iter: 1000
      solver: lbfgs
      class_weight: balanced
    random_forest:
      n_estimators: 400
      max_depth: 8
      min_samples_split: 4
      min_samples_leaf: 2
      class_weight: balanced
      n_jobs: -1
    xgboost:
      n_estimators: 400
      max_depth: 4
      learning_rate: 0.05
      subsample: 0.90
      colsample_bytree: 0.90
      min_child_weight: 1.0
      reg_lambda: 1.0
      eval_metric: logloss
      tree_method: hist
      n_jobs: 1

mlflow:
  tracking_uri: http://mlflow-tracking:5000
  expreiment_name: diabetes-risk-predictor_model
  train_run_name: train_three_models_v1
  eval_run_name: evaluate-three-models-v1
  registered_model_name: diasense-diabetes-risk
  register_best_after_training: false
  serving_model_stage: Production
  archive_existing_versions: true

evaluate:
  thresholds:
    minimums:
      accuracy: 0.70
      f1: 0.60
      roc_auc: 0.75
    maximums:
      log_loss: 0.70
  mlflow_evaluator:
    enabled: false
    log_explainer: false
